          justify-content: center;

    <script type="module" src="js/firebase.js"></script>
    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import {
        onAuthStateChanged,
        updateProfile,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        doc,
        getDoc,
        updateDoc,
        collection,
        collectionGroup,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // Redirect if not logged in
      onAuthStateChanged(auth, async (user) => {
        if (!user) return (window.location.href = "login.html");

        // Fill profile info
        document.getElementById("profileName").textContent =
          user.displayName || "No name set";
        document.getElementById("profileUsername").textContent =
          "@" + user.email.split("@")[0];
        document.getElementById("profileEmail").innerHTML =
          `<i class="fas fa-envelope"></i> ${user.email}`;
        document.getElementById("profileAvatar").src =
          user.photoURL ||
          `https://api.dicebear.com/7.x/thumbs/svg?seed=${user.uid}`;

        // Get extra info from Firestore
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if (userSnap.exists()) {
          const data = userSnap.data();
          if (data.joinedAt) {
            const date = data.joinedAt
              .toDate()
              .toLocaleDateString("en-UG", {
                year: "numeric",
                month: "long",
                day: "numeric",
              });
            document.getElementById("profileJoined").innerHTML =
              `<i class="fas fa-calendar"></i> Joined ${date}`;
          }
          // Downloads
          if (data.downloads && data.downloads.length > 0) {
            const list = document.getElementById("myDownloadsList");
            list.innerHTML = "";
            data.downloads.forEach((dl) => {
              list.innerHTML += `
              <div class="download-item">
                <i class="fas fa-film"></i>
                <span>${dl.title}</span>
                <a href="${dl.url}" target="_blank" download><i class="fas fa-download"></i> Download</a>
              </div>`;
            });
          }
        }

        // Load my comments — comments live in videos/{id}/comments subcollections
        try {
          const q = query(
            collectionGroup(db, "comments"),
            where("userId", "==", user.uid),
          );
          const snap = await getDocs(q);
          if (!snap.empty) {
            const list = document.getElementById("myCommentsList");
            list.innerHTML = "";
            snap.forEach((d) => {
              const c = d.data();
              list.innerHTML += `
              <div class="comment-profile-item">
                <p>${c.text}</p>
                <span><i class="fas fa-clock"></i> ${c.createdAt?.toDate().toLocaleDateString() || "Recently"}</span>
              </div>`;
            });
          }
        } catch (e) {}

        // Save name
        document
          .getElementById("saveNameBtn")
          .addEventListener("click", async () => {
            const newName = document
              .getElementById("editNameInput")
              .value.trim();
            const msg = document.getElementById("profileMsg");
            if (!newName) {
              msg.textContent = "Please enter a name.";
              msg.className = "profile-msg error";
              return;
            }
            try {
              await updateProfile(user, { displayName: newName });
              await updateDoc(doc(db, "users", user.uid), { name: newName });
              document.getElementById("profileName").textContent = newName;
              msg.textContent = "Name updated successfully!";
              msg.className = "profile-msg success";
            } catch (e) {
              msg.textContent = "Error updating name.";
              msg.className = "profile-msg error";
            }
          });
      });

      // Logout
      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          await signOut(auth);
          window.location.href = "index.html";
        });
    </script>
