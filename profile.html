<html lang="en">

    <meta charset="UTF-8" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — Leaked Archives</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script>
      (function (s) {
        ((s.dataset.zone = "11034900"),
          (s.src = "https://n6wxm.com/vignette.min.js"));
      })(
        [document.documentElement, document.body]

          .pop()
          .appendChild(document.createElement("script")),
      );

  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <button class="hamburger" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        <a href="index.html" class="logo">
          <span class="logo-red">LEAKED</span
          ><span class="logo-white">ARCHIVES</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="index.html" class="btn-login"
          ><i class="fas fa-house"></i> Home</a
        >
        <button
          class="btn-login"
          id="logoutBtn"
          style="background: var(--bg3); border: 1px solid var(--border)"
        >
          <i class="fas fa-sign-out-alt"></i> Sign Out
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="profile-page">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar-wrap">
          <img
            id="profileAvatar"
            src="https://api.dicebear.com/7.x/thumbs/svg?seed=user"
            class="profile-avatar"
          />
        </div>
        <div class="profile-info">
          <h1 id="profileName">Loading...</h1>
          <p id="profileUsername" class="profile-username">@username</p>
          <p id="profileEmail" class="profile-email">
            <i class="fas fa-envelope"></i> email
          </p>
          <p id="profileJoined" class="profile-joined">
            <i class="fas fa-calendar"></i> Joined recently
          </p>
        </div>
      </div>

      <!-- Edit Name -->
      <div class="profile-section">
        <h2><i class="fas fa-pen"></i> Edit Display Name</h2>
        <div class="profile-edit-row">
          <input
            type="text"
            id="editNameInput"
            placeholder="Enter new display name"
          />
          <button class="btn-save" id="saveNameBtn">
            <i class="fas fa-check"></i> Save
          </button>
        </div>
        <div class="profile-msg hidden" id="profileMsg"></div>
      </div>

      <!-- My Comments -->
      <div class="profile-section">
        <h2><i class="fas fa-comments"></i> My Comments</h2>
        <div id="myCommentsList" class="profile-list">
          <div class="profile-empty">
            <i class="fas fa-comment-slash"></i>
            <p>No comments yet</p>
          </div>
        </div>
      </div>

      <!-- My Downloads -->
      <div class="profile-section">
        <h2><i class="fas fa-download"></i> Downloaded Videos</h2>
        <div id="myDownloadsList" class="profile-list">
          <div class="profile-empty">
            <i class="fas fa-film"></i>
            <p>No downloads yet</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Add profile styles -->
    <style>
      .profile-page {
        margin-top: var(--nav-h);
        padding: 32px 24px 60px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .profile-header {
        display: flex;
        gap: 24px;
        align-items: center;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .profile-avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid var(--red);
        object-fit: cover;
      }
      .profile-info {
        flex: 1;
      }
      .profile-info h1 {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 4px;
      }
      .profile-username {
        color: var(--red);
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 6px;
      }
      .profile-email,
      .profile-joined {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .profile-section {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 20px;
      }
      .profile-section h2 {
        font-size: 16px;
        font-weight: 800;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--white);
      }
      .profile-section h2 i {
        color: var(--red);
      }

      .profile-edit-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .profile-edit-row input {
        flex: 1;
      }
      .btn-save {
        background: var(--red);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 14px;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: background var(--transition);
      }
      .btn-save:hover {
        background: var(--red-dark);
      }

      .profile-msg {
        margin-top: 10px;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
      }
      .profile-msg.success {
        background: rgba(40, 200, 80, 0.15);
        color: #4cdb7a;
      }
      .profile-msg.error {
        background: rgba(230, 57, 70, 0.15);
        color: var(--red);
      }

      .profile-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .profile-empty {
        text-align: center;
        padding: 32px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .profile-empty i {
        font-size: 32px;
        color: var(--bg4);
      }

      .comment-profile-item {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
      }
      .comment-profile-item p {
        font-size: 14px;
        color: var(--white);
        margin-bottom: 4px;
      }
      .comment-profile-item span {
        font-size: 12px;
        color: var(--muted);
      }

      .download-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
      }
      .download-item i {
        color: var(--red);
        font-size: 20px;
      }
      .download-item span {
        font-size: 14px;
        font-weight: 600;
        flex: 1;
      }
      .download-item a {
        background: var(--red);
        color: white;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
      }

      @media (max-width: 600px) {
        .profile-page {
          padding: 20px 12px 60px;
        }
        .profile-header {
          flex-direction: column;
          text-align: center;
          align-items: center;
        }
        .profile-edit-row {
          flex-direction: column;
        }
        .btn-save {
          width: 100%;
          justify-content: center;
        }
      }
    </style>

    <script type="module" src="js/firebase.js"></script>
    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import {
        onAuthStateChanged,
        updateProfile,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        doc,
        getDoc,
        updateDoc,
        collection,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // Redirect if not logged in
      onAuthStateChanged(auth, async (user) => {
        if (!user) return (window.location.href = "login.html");

        // Fill profile info
        document.getElementById("profileName").textContent =
          user.displayName || "No name set";
        document.getElementById("profileUsername").textContent =
          "@" + user.email.split("@")[0];
        document.getElementById("profileEmail").innerHTML =
          `<i class="fas fa-envelope"></i> ${user.email}`;
        document.getElementById("profileAvatar").src =
          user.photoURL ||
          `https://api.dicebear.com/7.x/thumbs/svg?seed=${user.uid}`;

        // Get extra info from Firestore
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if (userSnap.exists()) {
          const data = userSnap.data();
          if (data.joinedAt) {
            const date = data.joinedAt
              .toDate()
              .toLocaleDateString("en-UG", {
                year: "numeric",
                month: "long",
                day: "numeric",
              });
            document.getElementById("profileJoined").innerHTML =
              `<i class="fas fa-calendar"></i> Joined ${date}`;
          }
          // Downloads
          if (data.downloads && data.downloads.length > 0) {
            const list = document.getElementById("myDownloadsList");
            list.innerHTML = "";
            data.downloads.forEach((dl) => {
              list.innerHTML += `
              <div class="download-item">
                <i class="fas fa-film"></i>
                <span>${dl.title}</span>
                <a href="${dl.url}" target="_blank" download><i class="fas fa-download"></i> Download</a>
              </div>`;
            });
          }
        }

        // Load my comments
        try {
          const q = query(
            collection(db, "comments"),
            where("userId", "==", user.uid),
          );
          const snap = await getDocs(q);
          if (!snap.empty) {
            const list = document.getElementById("myCommentsList");
            list.innerHTML = "";
            snap.forEach((d) => {
              const c = d.data();
              list.innerHTML += `
              <div class="comment-profile-item">
                <p>${c.text}</p>
                <span><i class="fas fa-clock"></i> ${c.createdAt?.toDate().toLocaleDateString() || "Recently"}</span>
              </div>`;
            });
          }
        } catch (e) {}

        // Save name
        document
          .getElementById("saveNameBtn")
          .addEventListener("click", async () => {
            const newName = document
              .getElementById("editNameInput")
              .value.trim();
            const msg = document.getElementById("profileMsg");
            if (!newName) {
              msg.textContent = "Please enter a name.";
              msg.className = "profile-msg error";
              return;
            }
            try {
              await updateProfile(user, { displayName: newName });
              await updateDoc(doc(db, "users", user.uid), { name: newName });
              document.getElementById("profileName").textContent = newName;
              msg.textContent = "Name updated successfully!";
              msg.className = "profile-msg success";
            } catch (e) {
              msg.textContent = "Error updating name.";
              msg.className = "profile-msg error";
            }
          });
      });

      // Logout
      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          await signOut(auth);
          window.location.href = "index.html";
        });
    </script>

  </body>
</html>
