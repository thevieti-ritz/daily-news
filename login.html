  <meta charset="UTF-8"/>

  <title>Sign In — Leaked Archives</title>
  <link rel="stylesheet" href="css/style.css"/>

<body class="auth-page">

  <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

  <div class="auth-container">

    <div class="auth-logo">
      <span class="logo-red">LEAKED</span><span class="logo-white">ARCHIVES</span>
    </div>
    <p class="auth-tagline">Sign in to comment, download &amp; more</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn">Sign In</button>
      <button class="auth-tab" id="tabSignUp">Create Account</button>
    </div>

    <div class="auth-message hidden" id="authMessage"></div>

    <!-- SIGN IN FORM -->
    <div class="auth-form" id="signInForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signInEmail" placeholder="Email address" autocomplete="email"/>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signInPassword" placeholder="Password" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw('signInPassword')"><i class="fas fa-eye"></i></button>
      </div>
      <button class="btn-auth" id="signInBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-google" id="googleSignInBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/> Continue with Google
      </button>
      <p class="forgot-pw"><a href="#" id="forgotPwLink">Forgot password?</a></p>
    </div>

    <!-- SIGN UP FORM -->
    <div class="auth-form hidden" id="signUpForm">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="signUpName" placeholder="Your full name"/>
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signUpEmail" placeholder="Email address" autocomplete="email"/>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signUpPassword" placeholder="Create a password (min 6 chars)" autocomplete="new-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw('signUpPassword')"><i class="fas fa-eye"></i></button>
      </div>
      <button class="btn-auth" id="signUpBtn"><i class="fas fa-user-plus"></i> Create Account</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-google" id="googleSignUpBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/> Continue with Google
      </button>
    </div>

  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script>
    function togglePw(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
<script>
  // ---- Monetag Vignette Ad Trigger ----
  let lastAdTime = 0;
  const COOLDOWN = 8000;

  function fireVignette() {
    const now = Date.now();
    if (now - lastAdTime < COOLDOWN) return;
    lastAdTime = now;

    try {
      if (typeof window.__vm !== "undefined") {
        window.__vm.push({ zone: 11035918 });
        setTimeout(() => {
          if (typeof window.__vm !== "undefined") {
            window.__vm.push({ zone: 11046408 });
          }
        }, 1000);
        return;
      }

      const zones = [
        { zone: "11035918", src: "https://n6wxm.com/vignette.min.js" },
        { zone: "11046408", src: "https://al5sm.com/tag.min.js"      }
      ];
      zones.forEach((ad, i) => {
        setTimeout(() => {
          try {
            document.querySelectorAll(`script[data-zone="${ad.zone}"]`)
              .forEach(el => el.remove());
            const s = document.createElement("script");
            s.dataset.zone = ad.zone;
            s.src          = ad.src + "?_=" + Date.now();
            document.head.appendChild(s);
          } catch(e) {}
        }, i * 1200);
      });

    } catch(e) {}
  }

  // Fire on any click
  document.addEventListener("click", fireVignette, { passive: true });

  // Fire on specific elements
  document.addEventListener("click", function(e) {
    if (
      e.target.closest(".related-card")    ||
      e.target.closest(".action-btn")      ||
      e.target.closest(".back-btn")        ||
      e.target.closest(".side-link")       ||
      e.target.closest(".bottom-nav-item") ||
      e.target.closest(".video-card")
    ) {
      fireVignette();
    }
  }, { passive: true });

  // Fire on sidebar open
  document.getElementById("menuToggle")?.addEventListener("click", fireVignette);

  // Fire on page load after 3 seconds
  setTimeout(fireVignette, 3000);

  // Fire every 30 seconds while on page
  setInterval(fireVignette, 30000);

</script>
