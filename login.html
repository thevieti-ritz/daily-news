<!DOCTYPE html>
<html lang="en">
<head>
<!-- Monetag Vignette Ads — proxied through own domain to reduce blocking -->
  <script>
    (function() {
      var zones = [
        { zone: '11035918', src: 'https://mon.dailynewsug.online/vignette.min.js' },
        { zone: '11034900', src: 'https://mon.dailynewsug.online/vignette.min.js' },
        { zone: '11028744', src: 'https://mon.dailynewsug.online/vignette.min.js' },
        { zone: '11209621', src: 'https://mon.dailynewsug.online/vignette.min.js' }
      ];
      zones.forEach(function(ad, i) {
        setTimeout(function() {
          try {
            var s = document.createElement('script');
            s.dataset.zone = ad.zone;
            s.async = true;
            // Try proxied domain first, fallback to direct
            s.onerror = function() {
              var fallback = document.createElement('script');
              fallback.dataset.zone = ad.zone;
              fallback.async = true;
              fallback.src = 'https://n6wxm.com/vignette.min.js';
              document.head.appendChild(fallback);
            };
            s.src = ad.src;
            document.head.appendChild(s);
          } catch(e) {}
        }, i * 300);
      });
    })();
  </script>
  <meta charset="UTF-8"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Leaked Archives</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

  <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

  <div class="auth-container">

    <div class="auth-logo">
      <span class="logo-red">LEAKED</span><span class="logo-white">ARCHIVES</span>
    </div>
    <p class="auth-tagline">Sign in to comment, download &amp; more</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn">Sign In</button>
      <button class="auth-tab" id="tabSignUp">Create Account</button>
    </div>

    <div class="auth-message hidden" id="authMessage"></div>

    <!-- SIGN IN FORM -->
    <div class="auth-form" id="signInForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signInEmail" placeholder="Email address" autocomplete="email"/>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signInPassword" placeholder="Password" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw('signInPassword')"><i class="fas fa-eye"></i></button>
      </div>
      <button class="btn-auth" id="signInBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-google" id="googleSignInBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/> Continue with Google
      </button>
      <p class="forgot-pw"><a href="#" id="forgotPwLink">Forgot password?</a></p>
    </div>

    <!-- SIGN UP FORM -->
    <div class="auth-form hidden" id="signUpForm">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="signUpName" placeholder="Your full name"/>
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signUpEmail" placeholder="Email address" autocomplete="email"/>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signUpPassword" placeholder="Create a password (min 6 chars)" autocomplete="new-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw('signUpPassword')"><i class="fas fa-eye"></i></button>
      </div>
      <button class="btn-auth" id="signUpBtn"><i class="fas fa-user-plus"></i> Create Account</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-google" id="googleSignUpBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/> Continue with Google
      </button>
    </div>

  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script>
    function togglePw(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
