<body style="background-color:#f6f6f6;">

    <!-- ADMIN HEADER -->
    <div class="admin-header-bar">
        <h1>⚙️ Daily News — Admin Panel</h1>
        <div style="display:flex; align-items:center; gap:16px;">
            <a href="index.html">← Back to Website</a>
            <button onclick="signOutAdmin()" style="background:#c70000; color:#fff; border:none; padding:7px 14px; font-weight:700; cursor:pointer; border-radius:2px; font-size:13px;">Sign Out</button>
        </div>
    </div>

    <div class="admin-wrap">
        <div class="admin-layout">

            <!-- WRITE ARTICLE FORM -->
            <div id="articleForm">
                <h2 id="formTitle">Write New Article</h2>

                <input type="hidden" id="editId">
                <input type="hidden" id="currentImage">

                <div class="admin-form-group">
                    <label for="artTitle">Headline *</label>
                    <input type="text" id="artTitle" placeholder="Enter the article headline...">
                </div>

                <div class="admin-form-group">
                    <label for="artCategory">Category *</label>
                    <select id="artCategory">
                        <option value="">Select category</option>
                        <option value="Politics">Politics</option>
                        <option value="Business">Business</option>
                        <option value="Sports">Sports</option>
                        <option value="Technology">Technology</option>
                        <option value="Health">Health</option>
                        <option value="Environment">Environment</option>
                        <option value="Education">Education</option>
                        <option value="Opinion">Opinion</option>
                    </select>
                </div>

                <div class="admin-form-group">
                    <label for="artAuthor">Author Name *</label>
                    <input type="text" id="artAuthor" placeholder="e.g. John Doe">
                </div>

                <div class="admin-form-group">
                    <label for="artStandfirst">Standfirst / Summary *</label>
                    <textarea id="artStandfirst" rows="3" placeholder="A short summary that appears below the headline..."></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="artBody">Article Body *</label>
                    <textarea id="artBody" placeholder="Write the full article here. Separate paragraphs with a blank line..."></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="artImage">Featured Image</label>
                    <input type="file" id="artImage" accept="image/*">
                    <div class="image-preview-wrap" id="imagePreviewWrap">
                        <img id="imagePreview" src="" alt="Preview">
                    </div>
                    <div class="image-upload-status" id="imageUploadStatus"></div>
                </div>

                <div class="admin-btn-row">
                    <button id="publishBtn">Publish Article</button>
                    <button id="resetBtn">Clear Form</button>
                </div>
            </div>

            <!-- PUBLISHED ARTICLES -->
            <div class="admin-articles-panel">
                <h2>Published Articles</h2>
                <div id="adminArticleList">
                    <p class="loading-msg">Loading articles...</p>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4U6MWTPKDQZ_oICtSLdfnFP3a-HFILb4",
            authDomain: "daily-news-a8c64.firebaseapp.com",
            projectId: "daily-news-a8c64",
            storageBucket: "daily-news-a8c64.firebasestorage.app",
            messagingSenderId: "75335342698",
            appId: "1:75335342698:web:3e65f3d773eca7730b4813"
        };

        // ================================
        // CLOUDINARY CONFIG
        // ================================
        const CLOUDINARY_CLOUD_NAME = 'dpbdwrnfw';
        const CLOUDINARY_UPLOAD_PRESET = 'daily_news_uploads';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ================================
        // AUTH GUARD
        // ================================
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                const headerBar = document.querySelector('.admin-header-bar');
                if (headerBar) {
                    const userInfo = document.createElement('span');
                    userInfo.style.cssText = 'font-size:12px; color:rgba(255,255,255,0.7); margin-right:16px;';
                    userInfo.textContent = `Logged in as ${user.email}`;
                    headerBar.insertBefore(userInfo, headerBar.querySelector('a'));
                }
                loadAdminArticles();
                loadAdminJobs();
                setupImagePreview();
            }
        });

        // ================================
        // SIGN OUT
        // ================================
        window.signOutAdmin = async function() {
            await signOut(auth);
            window.location.href = 'login.html';
        }

        // ================================
        // IMAGE PREVIEW
        // ================================
        function setupImagePreview() {
            const imageInput = document.getElementById('artImage');
            const previewWrap = document.getElementById('imagePreviewWrap');
            const preview = document.getElementById('imagePreview');

            if (!imageInput) return;

            imageInput.addEventListener('change', () => {
                const file = imageInput.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    previewWrap.style.display = 'block';
                };
                reader.readAsDataURL(file);
            });
        }

        // ================================
        // UPLOAD IMAGE TO CLOUDINARY
        // ================================
        async function uploadImageToCloudinary(file) {
            const statusEl = document.getElementById('imageUploadStatus');

            statusEl.textContent = '⏳ Uploading image...';
            statusEl.className = 'image-upload-status uploading';
            statusEl.style.display = 'block';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                formData.append('cloud_name', CLOUDINARY_CLOUD_NAME);

                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
                    { method: 'POST', body: formData }
                );

                const data = await response.json();

                if (data.secure_url) {
                    statusEl.textContent = '✅ Image uploaded successfully!';
                    statusEl.className = 'image-upload-status done';
                    return data.secure_url;
                } else {
                    throw new Error(data.error?.message || 'Upload failed');
                }

            } catch (error) {
                statusEl.textContent = `❌ Image upload failed: ${error.message}`;
                statusEl.className = 'image-upload-status error';
                return '';
            }
        }

        // ================================
        // LOAD ARTICLES
        // ================================
        async function loadAdminArticles() {
            const list = document.getElementById('adminArticleList');
            list.innerHTML = '<p class="loading-msg">Loading articles...</p>';

            try {
                const q = query(collection(db, 'articles'), orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    list.innerHTML = '<p class="no-articles">No articles yet. Create your first one above!</p>';
                    return;
                }

                list.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const a = docSnap.data();
                    const id = docSnap.id;
                    const card = document.createElement('div');
                    card.className = 'admin-article-card';
                    card.innerHTML = `
                        ${a.imageUrl
                            ? `<img src="${a.imageUrl}" class="admin-card-thumb" alt="${a.title}">`
                            : `<div class="admin-card-thumb-placeholder"></div>`
                        }
                        <div class="admin-card-info" style="flex:1;">
                            <span class="label ${a.category.toLowerCase()}-label">${a.category}</span>
                            <h3>${a.title}</h3>
                            <div class="admin-card-meta">
                                <span>By ${a.author}</span>
                                <span>${a.date}</span>
                            </div>
                        </div>
                        <div class="admin-card-actions">
                            <button class="edit-btn" onclick="editArticle('${id}')">Edit</button>
                            <button class="delete-btn" onclick="deleteArticle('${id}')">Delete</button>
                        </div>
                    `;
                    list.appendChild(card);
                });

            } catch (error) {
                list.innerHTML = `<p class="error-msg">Error: ${error.message}</p>`;
            }
        }

        // ================================
        // PUBLISH ARTICLE
        // ================================
        async function publishArticle() {
            const title = document.getElementById('artTitle').value.trim();
            const category = document.getElementById('artCategory').value;
            const author = document.getElementById('artAuthor').value.trim();
            const standfirst = document.getElementById('artStandfirst').value.trim();
            const body = document.getElementById('artBody').value.trim();
            const imageFile = document.getElementById('artImage').files[0];
            const editId = document.getElementById('editId').value;

            if (!title || !category || !author || !standfirst || !body) {
                showNotification('Please fill in all required fields.', 'error');
                return;
            }

            const publishBtn = document.getElementById('publishBtn');
            publishBtn.textContent = 'Publishing...';
            publishBtn.disabled = true;

            try {
                // Upload image if provided
                let imageUrl = document.getElementById('currentImage').value || '';
                if (imageFile) {
                    imageUrl = await uploadImageToCloudinary(imageFile);
                }

                const articleData = {
                    title,
                    category,
                    author,
                    standfirst,
                    body,
                    imageUrl,
                    date: new Date().toLocaleDateString('en-GB', {
                        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                    }),
                    createdAt: new Date().toISOString()
                };

                if (editId) {
                    await updateDoc(doc(db, 'articles', editId), articleData);
                    showNotification('Article updated successfully!', 'success');
                } else {
                    await addDoc(collection(db, 'articles'), articleData);
                    showNotification('Article published successfully!', 'success');
                }

                resetForm();
                loadAdminArticles();

            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            } finally {
                publishBtn.textContent = 'Publish Article';
                publishBtn.disabled = false;
            }
        }

        // ================================
        // DELETE ARTICLE
        // ================================
        window.deleteArticle = async function(id) {
            if (!confirm('Are you sure you want to delete this article?')) return;
            try {
                await deleteDoc(doc(db, 'articles', id));
                showNotification('Article deleted.', 'success');
                loadAdminArticles();
            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        // ================================
        // EDIT ARTICLE
        // ================================
        window.editArticle = async function(id) {
            try {
                const snapshot = await getDocs(collection(db, 'articles'));
                snapshot.forEach(docSnap => {
                    if (docSnap.id === id) {
                        const a = docSnap.data();
                        document.getElementById('artTitle').value = a.title;
                        document.getElementById('artCategory').value = a.category;
                        document.getElementById('artAuthor').value = a.author;
                        document.getElementById('artStandfirst').value = a.standfirst;
                        document.getElementById('artBody').value = a.body;
                        document.getElementById('editId').value = id;
                        document.getElementById('currentImage').value = a.imageUrl || '';
                        document.getElementById('formTitle').textContent = 'Edit Article';
                        document.getElementById('publishBtn').textContent = 'Update Article';

                        // Show existing image preview
                        if (a.imageUrl) {
                            const preview = document.getElementById('imagePreview');
                            const previewWrap = document.getElementById('imagePreviewWrap');
                            preview.src = a.imageUrl;
                            previewWrap.style.display = 'block';
                        }

                        document.getElementById('articleForm').scrollIntoView({ behavior: 'smooth' });
                    }
                });
            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        // ================================
        // RESET FORM
        // ================================
        function resetForm() {
            document.getElementById('artTitle').value = '';
            document.getElementById('artCategory').value = '';
            document.getElementById('artAuthor').value = '';
            document.getElementById('artStandfirst').value = '';
            document.getElementById('artBody').value = '';
            document.getElementById('artImage').value = '';
            document.getElementById('editId').value = '';
            document.getElementById('currentImage').value = '';
            document.getElementById('formTitle').textContent = 'Write New Article';
            document.getElementById('publishBtn').textContent = 'Publish Article';
            document.getElementById('imagePreviewWrap').style.display = 'none';
            document.getElementById('imageUploadStatus').style.display = 'none';
            document.getElementById('imageUploadStatus').textContent = '';
        }

        // ================================
        // NOTIFICATION
        // ================================
        function showNotification(message, type) {
            const existing = document.querySelector('.admin-notification');
            if (existing) existing.remove();
            const notif = document.createElement('div');
            notif.className = `admin-notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        // INIT

// LOAD JOBS FOR ADMIN

async function loadAdminJobs() {
    const list = document.getElementById('adminJobsList');
    if (!list) return;
    list.innerHTML = '<p class="loading-msg">Loading jobs...</p>';

    try {
        const q = query(collection(db, 'jobs'), orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
            list.innerHTML = '<p class="no-articles">No job submissions yet.</p>';
            return;
        }

        list.innerHTML = '';
        snapshot.forEach(docSnap => {
            const j = docSnap.data();
            const id = docSnap.id;
            const card = document.createElement('div');
            card.className = 'admin-article-card';
            card.innerHTML = `
                <div class="admin-card-info" style="flex:1;">
                    <span class="label ${j.approved ? 'tech-label' : 'health-label'}">${j.approved ? '✅ Published' : '⏳ Pending'}</span>
                    <h3>${j.title} — ${j.company}</h3>
                    <div class="admin-card-meta">
                        <span>${j.category}</span>
                        <span>${j.location}</span>
                        <span>${j.plan} (${j.price})</span>
                        <span>${j.contactEmail}</span>
                    </div>
                </div>
                <div class="admin-card-actions">
                    ${!j.approved ? `<button class="edit-btn" onclick="approveJob('${id}')">✅ Approve</button>` : ''}
                    <button class="delete-btn" onclick="deleteJob('${id}')">Delete</button>
                </div>
            `;
            list.appendChild(card);
        });

    } catch (error) {
        list.innerHTML = `<p class="error-msg">Error: ${error.message}</p>`;
    }
}

window.approveJob = async function(id) {
    try {
        await updateDoc(doc(db, 'jobs', id), { approved: true });
        showNotification('Job approved and published!', 'success');
        loadAdminJobs();
    } catch (error) {
        showNotification('Error: ' + error.message, 'error');
    }
};

window.deleteJob = async function(id) {
    if (!confirm('Delete this job posting?')) return;
    try {
        await deleteDoc(doc(db, 'jobs', id));
        showNotification('Job deleted.', 'success');
        loadAdminJobs();
    } catch (error) {
        showNotification('Error: ' + error.message, 'error');
    }
};
        document.getElementById('publishBtn').addEventListener('click', publishArticle);
        document.getElementById('resetBtn').addEventListener('click', resetForm);

    </script>
