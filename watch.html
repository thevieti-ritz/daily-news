<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch — Leaked Archives</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Video.js -->
  <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet"/>
  <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>

  <!-- Google IMA SDK (required for VAST ads) -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

  <!-- VideoJS IMA Plugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/6.9.0/videojs.ads.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/6.9.0/videojs.ads.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/1.10.1/videojs.ima.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/1.10.1/videojs.ima.min.css" rel="stylesheet"/>

  <!-- ExoClick Client Hints -->
  <meta http-equiv="Delegate-CH" content="Sec-CH-UA https://s.magsrv.com; Sec-CH-UA-Mobile https://s.magsrv.com; Sec-CH-UA-Arch https://s.magsrv.com; Sec-CH-UA-Model https://s.magsrv.com; Sec-CH-UA-Platform https://s.magsrv.com; Sec-CH-UA-Platform-Version https://s.magsrv.com; Sec-CH-UA-Bitness https://s.magsrv.com; Sec-CH-UA-Full-Version-List https://s.magsrv.com; Sec-CH-UA-Full-Version https://s.magsrv.com;"/>

  <style>
    /* Video.js custom styling */
    .video-wrap {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .video-js {
      width: 100% !important;
      height: 100% !important;
      min-height: 240px;
      border-radius: var(--radius);
    }
    .video-js .vjs-big-play-button {
      background: var(--red) !important;
      border: none !important;
      border-radius: 50% !important;
      width: 60px !important;
      height: 60px !important;
      line-height: 60px !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      margin: 0 !important;
    }
    .video-js .vjs-control-bar {
      background: linear-gradient(transparent, rgba(0,0,0,0.8)) !important;
    }
    .video-js .vjs-play-progress,
    .video-js .vjs-volume-level {
      background: var(--red) !important;
    }

    /* Fallback iframe (shown if direct MP4 fails) */
    .archive-iframe {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }
    .archive-iframe iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Aspect ratio wrapper */
    .player-outer {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .player-outer .video-wrap {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
    }
    .player-outer video {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <button class="hamburger" id="menuToggle"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="logo">
        <span class="logo-red">LEAKED</span><span class="logo-white">ARCHIVES</span>
      </a>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off"/>
      <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
    <div class="nav-right">
      <a href="login.html" class="btn-login" id="authLink"><i class="fas fa-user"></i> Sign In</a>
      <div class="user-menu hidden" id="userMenu">
        <img src="https://api.dicebear.com/7.x/thumbs/svg?seed=user" class="avatar" id="userAvatar"/>
        <div class="dropdown">
          <span id="userDisplayName"></span>
          <a href="admin.html"><i class="fas fa-upload"></i> Upload Video</a>
          <a href="profile.html"><i class="fas fa-circle-user"></i> My Profile</a>
          <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <nav class="side-nav">
      <button class="side-section-btn" id="categoriesToggle">
        <i class="fas fa-th-large"></i> Categories
        <i class="fas fa-chevron-down side-arrow" id="categoriesArrow"></i>
      </button>
      <div class="side-submenu" id="categoriesMenu">
        <a href="index.html?cat=entertainment" class="side-link sub"><i class="fas fa-film"></i> Entertainment</a>
        <a href="index.html?cat=celebrity" class="side-link sub"><i class="fas fa-star"></i> Celebrity</a>
        <a href="index.html?cat=viral" class="side-link sub"><i class="fas fa-fire"></i> Viral</a>
        <a href="index.html?cat=music" class="side-link sub"><i class="fas fa-music"></i> Music</a>
        <a href="index.html?cat=sports" class="side-link sub"><i class="fas fa-futbol"></i> Sports</a>
        <a href="index.html?cat=news" class="side-link sub"><i class="fas fa-newspaper"></i> News</a>
        <a href="index.html?cat=comedy" class="side-link sub"><i class="fas fa-face-laugh"></i> Comedy</a>
        <a href="index.html?cat=naija" class="side-link sub"><i class="fas fa-globe-africa"></i> Naija</a>
        <a href="index.html?cat=uganda" class="side-link sub"><i class="fas fa-globe-africa"></i> Uganda</a>
        <a href="index.html?cat=kenya" class="side-link sub"><i class="fas fa-globe-africa"></i> Kenya</a>
      </div>
      <hr/>
      <a href="history.html" class="side-link"><i class="fas fa-clock-rotate-left"></i> History</a>
      <a href="profile.html" class="side-link"><i class="fas fa-circle-user"></i> Profile</a>
      <a href="settings.html" class="side-link"><i class="fas fa-gear"></i> Settings</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main-content watch-layout" id="mainContent">
    <div class="watch-container">

      <!-- LEFT: Player + Info -->
      <div class="watch-left">

        <!-- Video Player -->
        <div class="player-outer">
          <div class="video-wrap" id="videoWrap">
            <video
              id="myVideo"
              class="video-js vjs-default-skin vjs-big-play-centered"
              controls
              preload="auto"
              playsinline
              crossorigin="anonymous">
            </video>
          </div>
        </div>

        <!-- Fallback Archive iframe (used if MP4 direct link fails) -->
        <div class="archive-iframe" id="archiveFallback">
          <iframe id="archiveIframe" src="" allowfullscreen
            allow="autoplay; fullscreen"></iframe>
        </div>

        <!-- Video Info -->
        <div class="video-info-box">
          <span class="video-category-badge" id="videoCategoryBadge">Category</span>
          <h1 class="video-title" id="videoTitle">Loading...</h1>
          <div class="video-meta-row">
            <span><i class="fas fa-eye"></i> <span id="viewCount">0</span> views</span>
            <span><i class="fas fa-calendar"></i> <span id="videoDate"></span></span>
          </div>
          <div class="action-row">
            <button class="action-btn" id="likeBtn">
              <i class="fas fa-thumbs-up"></i>
              <span id="likeCount">0</span>
            </button>
            <button class="action-btn" id="shareBtn">
              <i class="fas fa-share-nodes"></i> Share
            </button>
            <button class="action-btn" id="copyLinkBtn">
              <i class="fas fa-link"></i> Copy Link
            </button>
          </div>
          <div class="video-description" id="videoDescription"></div>
        </div>

        <!-- Comments -->
        <div class="comments-section">
          <h3><i class="fas fa-comments"></i> Comments
            <span id="commentCount" class="comment-count-badge">0</span>
          </h3>
          <div class="comment-form">
            <img src="https://api.dicebear.com/7.x/thumbs/svg?seed=guest"
                 class="comment-avatar" id="commentUserAvatar"/>
            <div class="comment-input-wrap">
              <input type="text" id="commentInput" placeholder="Add a comment..."/>
              <button class="btn-post-comment" id="postCommentBtn">
                <i class="fas fa-paper-plane"></i> Post
              </button>
            </div>
          </div>
          <div class="comments-list" id="commentsList">
            <div class="loading-screen"><div class="spinner"></div><p>Loading comments...</p></div>
          </div>
        </div>

      </div>

      <!-- RIGHT: Related Videos -->
      <div class="watch-right">
        <h3 class="related-title">More Videos</h3>
        <div class="related-list" id="relatedVideos">
          <div class="loading-screen"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Share Modal -->
  <div class="modal-overlay hidden" id="shareModal">
    <div class="modal">
      <button class="modal-close" id="closeShareModal"><i class="fas fa-times"></i></button>
      <h3>Share this video</h3>
      <div class="share-grid">
        <a class="share-btn whatsapp" id="shareWhatsapp" target="_blank">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
        <a class="share-btn facebook" id="shareFacebook" target="_blank">
          <i class="fab fa-facebook"></i> Facebook
        </a>
        <a class="share-btn twitter" id="shareTwitter" target="_blank">
          <i class="fab fa-x-twitter"></i> X / Twitter
        </a>
        <a class="share-btn telegram" id="shareTelegram" target="_blank">
          <i class="fab fa-telegram"></i> Telegram
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/watch.js"></script>

  <script>
    // Sidebar
    const menuToggle      = document.getElementById("menuToggle");
    const sidebar         = document.getElementById("sidebar");
    const sidebarOverlay  = document.getElementById("sidebarOverlay");
    const catToggle       = document.getElementById("categoriesToggle");
    const catMenu         = document.getElementById("categoriesMenu");
    const catArrow        = document.getElementById("categoriesArrow");

    menuToggle.addEventListener("click", () => {
      sidebar.classList.toggle("open");
      sidebarOverlay.classList.toggle("hidden");
    });
    sidebarOverlay.addEventListener("click", () => {
      sidebar.classList.remove("open");
      sidebarOverlay.classList.add("hidden");
    });
    catToggle.addEventListener("click", () => {
      const isOpen = catMenu.classList.toggle("open");
      catArrow.style.transform = isOpen ? "rotate(180deg)" : "rotate(0deg)";
    });
    document.querySelectorAll(".side-link").forEach(link => {
      link.addEventListener("click", () => {
        sidebar.classList.remove("open");
        sidebarOverlay.classList.add("hidden");
      });
    });
  </script>

</body>
</html>
