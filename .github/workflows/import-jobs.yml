name: Auto Import Jobs

on:
  schedule:
    # Runs every 12 hours — at 6:00 AM and 6:00 PM UTC (9AM and 9PM EAT)
    - cron: '0 6,18 * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  import-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Jobs Importer
        run: node jobs-importer.js

      - name: Log completion
        run: echo "✅ Jobs import completed at $(date)"
